<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 벌레 식별 및 방제 가이드</title>
  <link href="style.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <button id="themeToggle" class="theme-toggle">
    <span id="themeIcon">🌙</span>
    <span id="themeText">다크 모드</span>
  </button>

  <div class="container">
    <header>
      <h1>AI 벌레 식별 분석기</h1>
      <p>사진을 찍어 올리면 어떤 벌레인지 확인하고 방제법을 알려드립니다.</p>
    </header>

    <div class="upload-section">
      <div id="dropZone" class="drop-zone">
        <div class="drop-zone-content">
          <div class="icon-circle">
            <span class="upload-icon">🦟</span>
          </div>
          <p class="main-msg">벌레 사진을 업로드하세요</p>
          <p class="sub-msg">또는 클릭하여 촬영/선택</p>
          <span class="file-info">휴대폰 사진 지원 (JPG, PNG)</span>
        </div>
        <input type="file" id="fileInput" accept="image/*" hidden>
      </div>

      <div id="previewContainer" class="preview-container" style="display: none;">
        <img id="imagePreview" src="" alt="업로드된 이미지 미리보기">
        <div class="preview-overlay">
          <button id="removeBtn" class="remove-btn" title="이미지 삭제">✕ 삭제 후 다시 찍기</button>
        </div>
      </div>

      <button id="analyzeBtn" class="btn analyze-btn" disabled>
        <span class="btn-text">AI 벌레 분석 시작</span>
      </button>
    </div>

    <div id="resultSection" class="result-section" style="display: none;">
      <div id="loader" class="loader-wrapper">
        <div class="progress-bar-container">
          <div id="progressBar" class="progress-bar"></div>
        </div>
        <p id="statusMsg">재미나이 AI가 벌레를 식별 중입니다...</p>
      </div>

      <div id="analysisResult" class="analysis-result" style="display: none;">
        <div class="result-header">
          <span class="result-icon">🔍</span>
          <h3>식별 결과</h3>
        </div>
        
        <div class="bug-info-card">
          <div class="bug-name-row">
            <span class="label">예상 벌레:</span>
            <span id="bugName" class="value">-</span>
          </div>
          <div class="probability-row">
            <div class="prob-label-group">
              <span class="label">일치 확률:</span>
              <span id="probabilityText" class="value">0%</span>
            </div>
            <div class="prob-bar-bg">
              <div id="probBarInner" class="prob-bar-inner"></div>
            </div>
          </div>
        </div>

        <div class="pest-control-guide">
          <h4>💡 방제 방법 및 추천 약제</h4>
          <p id="controlMethod"></p>
        </div>

        <button onclick="location.reload()" class="btn retry-btn">다른 사진 분석하기</button>
      </div>
    </div>
  </div>

  <script defer src="main.js"></script>
</body>
</html>
