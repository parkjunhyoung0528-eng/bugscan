<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>버그스캔(BugScan) - 사진 분석</title>
  <link href="style.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <button id="themeToggle" class="theme-toggle">
    <span id="themeIcon">🌙</span>
    <span id="themeText">다크 모드</span>
  </button>

  <div class="container">
    <header>
      <h1>버그스캔 분석기</h1>
      <p>분석할 사진을 업로드하면 버그를 찾아내 드립니다.</p>
    </header>

    <div class="upload-section">
      <div id="dropZone" class="drop-zone">
        <div class="drop-zone-content">
          <span class="upload-icon">📸</span>
          <p>사진을 이곳에 드래그하거나 클릭하여 업로드하세요</p>
          <span class="file-info">지원 형식: JPG, PNG, WEBP</span>
        </div>
        <input type="file" id="fileInput" accept="image/*" hidden>
      </div>

      <div id="previewContainer" class="preview-container" style="display: none;">
        <img id="imagePreview" src="" alt="미리보기">
        <button id="removeBtn" class="remove-btn">✕</button>
      </div>

      <button id="analyzeBtn" class="btn analyze-btn" disabled>분석하기</button>
    </div>

    <div id="resultSection" class="result-section" style="display: none;">
      <div class="loader-container" id="loader">
        <div class="loader"></div>
        <p>사진을 분석하고 있습니다...</p>
      </div>
      <div id="analysisResult" class="analysis-result" style="display: none;">
        <h3>분석 결과</h3>
        <p id="resultText"></p>
      </div>
    </div>
  </div>

  <script defer src="main.js"></script>
</body>
</html>
