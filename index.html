<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 디자인 결함 자동 검사기</title>
  <link href="style.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <button id="themeToggle" class="theme-toggle">
    <span id="themeIcon">🌙</span>
    <span id="themeText">다크 모드</span>
  </button>

  <div class="container">
    <header>
      <h1>AI 디자인 결함 자동 검사기</h1>
      <p>분석할 사진을 아래 영역에 넣어주세요. AI가 즉시 결함을 탐지합니다.</p>
    </header>

    <div class="upload-section">
      <div id="dropZone" class="drop-zone">
        <div class="drop-zone-content">
          <div class="icon-circle">
            <span class="upload-icon">📤</span>
          </div>
          <p class="main-msg">여기에 사진을 드래그하여 놓으세요</p>
          <p class="sub-msg">또는 클릭하여 파일 선택</p>
          <span class="file-info">PNG, JPG, WEBP 지원 (최대 10MB)</span>
        </div>
        <input type="file" id="fileInput" accept="image/*" hidden>
      </div>

      <div id="previewContainer" class="preview-container" style="display: none;">
        <img id="imagePreview" src="" alt="업로드된 이미지 미리보기">
        <div class="preview-overlay">
          <button id="removeBtn" class="remove-btn" title="이미지 삭제">✕ 삭제</button>
        </div>
      </div>

      <button id="analyzeBtn" class="btn analyze-btn" disabled>
        <span class="btn-text">AI 분석 시작하기</span>
      </button>
    </div>

    <div id="resultSection" class="result-section" style="display: none;">
      <div id="loader" class="loader-wrapper">
        <div class="progress-bar-container">
          <div id="progressBar" class="progress-bar"></div>
        </div>
        <p id="statusMsg">이미지 데이터를 분석하는 중...</p>
      </div>
      <div id="analysisResult" class="analysis-result" style="display: none;">
        <div class="result-header">
          <span class="result-icon">✅</span>
          <h3>분석 완료</h3>
        </div>
        <div class="result-body">
          <p id="resultText"></p>
        </div>
        <button onclick="location.reload()" class="btn retry-btn">새로 분석하기</button>
      </div>
    </div>
  </div>

  <script defer src="main.js"></script>
</body>
</html>
